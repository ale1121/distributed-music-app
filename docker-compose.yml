services:
  postgres:
    image: postgres:15-alpine
    container_name: muzo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: muzo
      POSTGRES_PASSWORD: muzo
      POSTGRES_DB: muzodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  web-api:
    build: ./backend
    container_name: muzo-web-api
    depends_on:
      - postgres
      - keycloak
      - opensearch
      - grafana
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: muzodb
      DB_USER: muzo
      DB_PASSWORD: muzo

      KC_URL: http://keycloak:8080
      KC_PUBLIC_URL: http://localhost:5002
      KC_REALM: muzo-realm
      KC_CLIENT_ID: muzo-client
      KC_REDIRECT_URI: http://localhost:5000/callback
      SECRET_KEY: secretkey

      OPENSEARCH_URL: http://opensearch:9200

      TIMEZONE: Europe/Bucharest

      UPLOADS_PATH: /data/uploads
      AUDIO_PATH: /data/audio

      STREAMING_URL: http://localhost:5001
      STREAM_SECRET: streamsecret
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./images_data:/data/uploads
      - ./audio_data:/data/audio

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: muzo-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-config:/opt/keycloak/data/import
    ports:
      - "5002:8080"

  streaming:
    build: ./streaming
    environment:
      AUDIO_PATH: /audio_data
      STREAM_SECRET: streamsecret
    container_name: muzo-streaming
    ports:
      - "5001:5000"
    volumes:
      - ./audio_data:/audio_data

  opensearch:
    image: opensearchproject/opensearch:3
    container_name: muzo-search
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: true
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Muzo123!@#%
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"

  grafana:
    image: grafana/grafana:latest
    container_name: muzo-stats
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGNUP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "5003:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    restart: unless-stopped
    depends_on:
      - postgres


volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local
  images_data:
    driver: local
  audio_data:
    driver: local
  opensearch_data:
    driver: local
  grafana_data:
    driver: local
