services:
  postgres:
    image: postgres:15-alpine
    container_name: muzo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: muzo
      POSTGRES_PASSWORD: muzo
      POSTGRES_DB: muzodb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d

  web-api:
    build: ./backend
    container_name: muzo-web-api
    depends_on:
      - postgres
      - keycloak
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: muzodb
      DB_USER: muzo
      DB_PASSWORD: muzo

      KC_URL: http://keycloak:8080
      KC_PUBLIC_URL: http://localhost:5002
      KC_REALM: muzo-realm
      KC_CLIENT_ID: muzo-client
      KC_REDIRECT_URI: http://localhost:5000/callback
      SECRET_KEY: topsecretkey

      TIMEZONE: Europe/Bucharest

      UPLOADS_PATH: /data/uploads
      AUDIO_PATH: /data/audio

      STREAMING_URL: http://localhost:5001
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - ./images_data:/data/uploads
      - ./audio_data:/data/audio

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    container_name: muzo-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-config:/opt/keycloak/data/import
    ports:
      - "5002:8080"

  streaming:
    build: ./streaming
    environment:
      AUDIO_PATH: /audio_data
    container_name: muzo-streaming
    ports:
      - "5001:5000"
    volumes:
      - ./audio_data:/audio_data

volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local
  images_data:
    driver: local
  audio_data:
    driver: local
