services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: muzo
      POSTGRES_PASSWORD: muzo
      POSTGRES_DB: muzodb
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks: [backend, stats]

  web-api:
    image: muzo-web
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: muzo
      DB_PASSWORD: muzo
      DB_NAME: muzodb

      KC_URL: http://keycloak:8080
      KC_PUBLIC_URL: http://localhost:5002
      KC_REALM: muzo-realm
      KC_CLIENT_ID: muzo-client
      KC_REDIRECT_URI: http://localhost:5000/callback
      SECRET_KEY: secretkey

      OPENSEARCH_URL: http://opensearch:9200

      TIMEZONE: Europe/Bucharest

      UPLOADS_PATH: /data/uploads
      AUDIO_PATH: /data/audio

      STREAMING_URL: http://localhost:5001
      STREAM_SECRET: streamsecret
      STREAMING_URL_TTL: 900

      GRAFANA_URL: http://localhost:5003
      GRAFANA_DASHBOARD: muzo-stats
    ports:
      - "5000:5000"
    deploy:
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 20
    volumes:
      - images_data:/data/uploads
      - audio_data:/data/audio
    networks: [auth, backend, search]

  streaming:
    image: muzo-streaming
    environment:
      AUDIO_PATH: /audio_data
      STREAM_SECRET: streamsecret
    ports:
      - "5001:5000"
    deploy:
      mode: replicated
      replicas: 3
      restart_policy:
        condition: on-failure
    volumes:
      - audio_data:/audio_data:ro
    networks: [stream]

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak-config:/opt/keycloak/data/import:ro
    ports:
      - "5002:8080"
    networks: [auth]

  opensearch:
    image: opensearchproject/opensearch:3
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Muzo123!@#%
    deploy:
      restart_policy:
        condition: on-failure
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks: [search]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGNUP: "false"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "5003:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    deploy:
      restart_policy:
        condition: on-failure
    networks: [stats]

volumes:
  postgres_data:
    driver: local
  keycloak_data:
    driver: local
  images_data:
    driver: local
  audio_data:
    driver: local
  opensearch_data:
    driver: local
  grafana_data:
    driver: local

networks:
  backend:
    driver: overlay
  auth:
    driver: overlay
  stream:
    driver: overlay
  search:
    driver: overlay
  stats:
    driver: overlay
