{% extends "layout/base.html" %}

{% block body %}
<nav class="navbar bg-darker p-3" style="z-index: 1000">
  <div class="container-fluid mt-2 mb-2">
    <img src="{{ url_for('static', filename='assets/logo.png') }}" alt="logo" width="120">
  </div>
</nav>

<div class="container d-flex justify-content-center align-items-center">
  <div class="col-12 col-sm-10 col-md-8 col-lg-6">
    <div class="card py-3 px-2 mt-5 bg-darker text-center">
      <div class="card-body">
        <h2 class="card-title mb-3">{% block title %}{% endblock %}</h2>
        {% block card_body %}{% endblock %}
      </div>
    </div>
  </div>
</div>

  {% endblock %}
