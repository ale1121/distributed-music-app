{% extends "layout/app_layout.html" %}

{% block content %}

<div class="my-4 ms-4">
  <div class="input-group" style="width: 480px;">
    <input id="searchInput" class="form-control form-control-lg" maxlength="100"
      placeholder="Search songs, albums, artists" autocomplete="off">
    <button class="btn btn-lg btn-secondary">
      <i class="bi bi-search"></i>
    </button> 
  </div>
  <div class="my-2">
    <input type="radio" class="btn-check" name="filters" id="songsCheck" value="song" autocomplete="off">
    <label class="btn btn-radio" for="songsCheck">Songs</label>
    
    <input type="radio" class="btn-check" name="filters" id="albumsCheck" value="album" autocomplete="off">
    <label class="btn btn-radio" for="albumsCheck">Albums</label>
    
    <input type="radio" class="btn-check" name="filters" id="artistsCheck" value="artist" autocomplete="off">
    <label class="btn btn-radio" for="artistsCheck">Artists</label>
  </div>
  <div class="card">
    <ul id="searchSuggestions" class="list-group list-group-flush list-group-search" style="width: 480px;">
      
    </ul>
  </div>
</div>

<h2 id="sectionTitle" class="ms-4 mt-5">Recently Played</h2>
<div class="ps-3 container" style="max-width: 1000px;">
  <div id="resultsGrid" class="row row-cols-auto">
    {% for song in recents %}
    <div class="col">
      <a href="{{ url_for('song.view', album_id=song.album_id, song_id=song.id) }}"
      class="card grid-card p-2 my-2" style="text-decoration: none; width: 200px;">
        <div class="d-flex flex-column align-items-start">
          <img class="rounded mb-2" width="180px"
            src="{{ url_for('uploads.get_cover', filename=song.cover_file) if song.cover_file
                    else url_for('static', filename='assets/placeholder-cover.webp') }}"
            onerror="this.src=`{{ url_for('static', filename='assets/placeholder-cover.webp') }}`">
          <div class="fw-semibold text-wrap text-break">{{ song.title }}</div>
          <div class="text-gray small">{{ song.album_title }} • {{ song.artist_name }}</div>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
</div>

<script>
  let selectedFilter = null

  const searchInput = document.getElementById("searchInput");
  const searchSuggestions = document.getElementById("searchSuggestions");

  function hideSuggestions() {
    searchSuggestions.innerHTML = "";
    searchSuggestions.classList.add("d-none");
  }

  function renderSuggestions(items) {
    searchSuggestions.innerHTML = "";
    if (!items.length) {
      searchSuggestions.classList.add("d-none");
      return;
    }

    items.forEach(item => {
      const el = document.createElement("a");
      el.className = "list-group-item list-group-item-action d-flex align-items-center gap-3";
      el.innerHTML = `
        <i class="bi fs-5
          ${item.type == 'Song' ? 'bi-music-note' : item.type == 'Album' ? 'bi-disc-fill' : 'bi-star-fill'}"
          style="color: var(--bs-gray-light-6);"></i>
        <div class="pe-2" style="max-width: 460px;">
          <div class="fw-semibold text-truncate">${item.name}</div>
          <div class="text-gray text-truncate small" style="margin-top: -2px;">
            ${item.type}${item.artist ? " • " + item.artist : ""}
          </div>
        </div>`;
      el.href = item.url;
      searchSuggestions.append(el);
    });

    searchSuggestions.classList.remove("d-none")
  }

  async function updateSuggestions() {
    const searchValue = searchInput.value.trim();
    
    if (searchValue.length < 3) {
      hideSuggestions();
      return;
    }

    try {
      let url = `/search/preview?q=${encodeURIComponent(searchValue)}`
      if (selectedFilter) {
        url += `&type=${selectedFilter}`;
      }

      const res = await fetch(url, {
        method: "GET",
        headers: {
          "Accept": "application/json"
        }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Something went wrong");

      renderSuggestions(data);
    } catch (err) {
      hideSuggestions();
      console.log("Search preview error: " + err);
    }
  }

  function debounce(callback, delay) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => callback(...args), delay)
    }
  }

  searchInput.addEventListener("input", debounce(async () => {
    updateSuggestions();
  }, 200))

  document.querySelectorAll('input[name="filters"]').forEach(radio => {
    radio.addEventListener("click", () => {
      if (selectedFilter == radio.value) {
        radio.checked = false;
        selectedFilter = null;
      } else {
        selectedFilter = radio.value;
      }
      updateSuggestions();
    });
  });

</script>

{% endblock %}
