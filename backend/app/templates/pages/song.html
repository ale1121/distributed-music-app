{% extends "layout/app_layout.html" %}

{% block content %}

<div class="ps-5 pt-5">
  <div class="row">
    <div class="col-12 col-md-auto col-lg-auto d-flex flex-column align-items-center justify-content-between">
      <img style="border-radius: 5%;" width="230px"
        src="{{ url_for('uploads.get_cover', filename=album.cover_file) if album.cover_file
                else url_for('static', filename='assets/placeholder-cover.png') }}"
        onerror="this.src=`{{ url_for('static', filename='assets/placeholder-cover.png') }}`">
      <button id="playBtn" class="btn btn-transparent"
        data-song-id="{{ song.id }}"
        data-song-title="{{ song.title }}"
        data-album-title="{{ album.title }}"
        data-album-cover="{{ url_for('uploads.get_cover', filename=album.cover_file) if album.cover_file
                            else url_for('static', filename='assets/placeholder-cover.png') }}"
        data-play-url="{{ url_for('song.play_song', album_id=album.id, song_id=song.id) }}"
        data-song-view-url="{{ url_for('song.view', album_id=album.id, song_id=song.id) }}">
        <i class="bi bi-play-circle-fill" style="font-size: 45px;"></i>
      </button>
    </div>

    <div class="col-12 col-md col-lg ms-3 mt-5" style="max-width: 600px;">
      <span class="text-gray">Song • {{ song.duration | format_duration }} </span>
      <h2 class="mt-1 text-break text-wrap">{{ song.title }}</h2>
      <div class="d-flex align-items-center gap-1" style="line-height: 17px;">
        <a href="{{ url_for('album.view', album_id=album.id) }}"
          class="fw-semibold link text-wrap text-break">
          {{ album.title }}
        </a>
        <span class="text-gray"> • </span>
        <span class="text-gray">{{ album.release_year }}</span>
      </div>
      <div class="d-flex align-items-center mt-3 gap-2">
        <img class="rounded-circle" width="30px"
          src="{{ url_for('uploads.get_avatar', filename=artist.avatar_file) if artist.avatar_file
                else url_for('static', filename='assets/placeholder-avatar.png') }}"
          onerror="this.src=`{{ url_for('static', filename='assets/placeholder-avatar.png') }}`">
        <a href="{{ url_for('artist.view', artist_id=artist.id) }}"
          class="fw-semibold link text-wrap text-break" style="line-height: 17px;">
          {{ artist_name }}
        </a>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <a class="d-flex align-items-center mt-3 gap-3"
      href="{{ url_for('artist.view', artist_id=artist.id) }}"
      style="text-decoration: none; color: var(--bs-off-white);">
      <img class="rounded-circle" width="70px"
        src="{{ url_for('uploads.get_avatar', filename=artist.avatar_file) if artist.avatar_file
                else url_for('static', filename='assets/placeholder-avatar.png') }}"
        onerror="this.src=`{{ url_for('static', filename='assets/placeholder-avatar.png') }}`">
      <div class="d-flex flex-column">
        <div class="fw-semibold">Artist</div>
        <div class="fw-semibold link text-wrap text-break" style="font-size: 20px;">
          {{ artist_name }}
        </div>
      </div>
    </a>

    <a class="d-flex align-items-center mt-4 gap-3"
      href="{{ url_for('album.view', album_id=album.id) }}"
      style="text-decoration: none; color: var(--bs-off-white);">
      <img class="rounded" width="70px"
        src="{{ url_for('uploads.get_cover', filename=album.cover_file) if album.cover_file
                else url_for('static', filename='assets/placeholder-cover.png') }}"
        onerror="this.src=`{{ url_for('static', filename='assets/placeholder-cover.png') }}`">
      <div class="d-flex flex-column">
        <div class="fw-semibold">Album</div>
        <div class="fw-semibold link text-wrap text-break" style="font-size: 20px;">
          {{ album.title }}
        </div>
      </div>
    </a>
  </div>
</div>

<script>
  const playBtn = document.getElementById("playBtn");
  playBtn.addEventListener("click", async () => {
    const songId = playBtn.dataset.songId;
    const songTitle = playBtn.dataset.songTitle;
    const albumTitle = playBtn.dataset.albumTitle;
    const albumCover = playBtn.dataset.albumCover;
    const songViewUrl = playBtn.dataset.songViewUrl;
    const playUrl = playBtn.dataset.playUrl;

    try {
      console.log("HELLOO????" + "aa");
      console.log("SONG ID: " + songId);
      console.log("SONG TITLE: " + songTitle);
      console.log("ALBUM TITLE: " + albumTitle);
      console.log("ALBUM COVER: " + albumCover);
      console.log("PLAY URL: " + playUrl);
      const res = await fetch(playUrl, {
        method: "GET",
        headers: {
          "Accept": "application/json"
        }
      });
      
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || "Something went wrong");
    
      const streamUrl = data["stream_url"];
      console.log("STREAM URL: " + streamUrl);
      if (!streamUrl) throw new Error("Missing stream URL");

      setPlayer({songId, songTitle, albumTitle, albumCover, songViewUrl, streamUrl});
    } catch (err) {
      showErrorToast(err.message || "Something went wrong");
    }
  })
</script>

{% endblock %}
